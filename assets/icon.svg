<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <!-- Deep Radar Screen Background -->
    <radialGradient id="radarBg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0c2a15"/>
      <stop offset="70%" stop-color="#041208"/>
      <stop offset="100%" stop-color="#020804"/>
    </radialGradient>
    
    <!-- Sweep Gradient for a realistic fade effect -->
    <linearGradient id="sweepGrad" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="rgba(35, 219, 93, 0.7)"/>
      <stop offset="40%" stop-color="rgba(35, 219, 93, 0.2)"/>
      <stop offset="100%" stop-color="rgba(35, 219, 93, 0)"/>
    </linearGradient>

    <!-- Red Enemy Glow -->
    <radialGradient id="redGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#da3633"/>
      <stop offset="50%" stop-color="rgba(218, 54, 51, 0.4)"/>
      <stop offset="100%" stop-color="rgba(218, 54, 51, 0)"/>
    </radialGradient>

    <!-- PR Badge Fill -->
    <linearGradient id="prBadge" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f85149"/>
      <stop offset="100%" stop-color="#da3633"/>
    </linearGradient>

    <!-- Subtle screen glow filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Base App Icon Background -->
  <rect width="256" height="256" rx="55" fill="#1b1f23"/>

  <!-- GitHub Cat Logo (Top Left Outside Radar) -->
  <g transform="translate(14, 14) scale(1.2)">
    <path fill="#8b949e" d="M12 2C6.477 2 2 6.477 2 12c0 4.42 2.865 8.166 6.839 9.489.5.092.682-.217.682-.482 0-.237-.008-.866-.013-1.7-2.782.603-3.369-1.34-3.369-1.34-.454-1.156-1.11-1.462-1.11-1.462-.908-.62.069-.608.069-.608 1.003.07 1.531 1.03 1.531 1.03.892 1.529 2.341 1.087 2.91.831.092-.646.35-1.086.636-1.336-2.22-.253-4.555-1.11-4.555-4.943 0-1.091.39-1.984 1.029-2.683-.103-.253-.446-1.27.098-2.647 0 0 .84-.269 2.75 1.025A9.578 9.578 0 0112 6.836c.85.004 1.705.114 2.504.336 1.909-1.294 2.747-1.025 2.747-1.025.546 1.379.203 2.394.1 2.647.64.699 1.028 1.592 1.028 2.683 0 3.842-2.339 4.687-4.566 4.935.359.309.678.919.678 1.852 0 1.336-.012 2.415-.012 2.743 0 .267.18.578.688.48C19.138 20.161 22 16.418 22 12c0-5.523-4.477-10-10-10z"/>
  </g>

  <!-- Green Radar Base with soft glow -->
  <circle cx="128" cy="128" r="110" fill="url(#radarBg)" stroke="#3fb950" stroke-width="4" filter="url(#glow)"/>

  <!-- Radar Grid - using dashed concentric circles for a techy look -->
  <circle cx="128" cy="128" r="28" fill="none" stroke="rgba(35, 219, 93, 0.4)" stroke-width="1.5" stroke-dasharray="4 4"/>
  <circle cx="128" cy="128" r="56" fill="none" stroke="rgba(35, 219, 93, 0.3)" stroke-width="1.5" />
  <circle cx="128" cy="128" r="84" fill="none" stroke="rgba(35, 219, 93, 0.2)" stroke-width="1.5" stroke-dasharray="8 6"/>
  
  <!-- Faded crosshairs -->
  <line x1="128" y1="18" x2="128" y2="238" stroke="rgba(35, 219, 93, 0.3)" stroke-width="2"/>
  <line x1="18" y1="128" x2="238" y2="128" stroke="rgba(35, 219, 93, 0.3)" stroke-width="2"/>
  
  <!-- Diagonal faint grid lines for measurement -->
  <line x1="50" y1="50" x2="206" y2="206" stroke="rgba(35, 219, 93, 0.15)" stroke-width="1" stroke-dasharray="2 4"/>
  <line x1="206" y1="50" x2="50" y2="206" stroke="rgba(35, 219, 93, 0.15)" stroke-width="1" stroke-dasharray="2 4"/>

  <!-- Sweep Area overlay using gradient fade -->
  <path d="M 128 128 L 128 18 A 110 110 0 0 1 205.7 50.3 Z" fill="url(#sweepGrad)" />
  <line x1="128" y1="128" x2="205.7" y2="50.3" stroke="#58ff82" stroke-width="3" stroke-linecap="round" filter="url(#glow)"/>

  <!-- Center Origin dot -->
  <circle cx="128" cy="128" r="4" fill="#58ff82" filter="url(#glow)"/>

  <!-- PR Badges -->
  <g transform="translate(136, 56)">
    <circle cx="14" cy="14" r="24" fill="url(#redGlow)"/>
    <rect x="0" y="4" width="28" height="20" rx="4" fill="url(#prBadge)" stroke="#ffb4b4" stroke-width="1" filter="url(#glow)"/>
    <text x="14" y="18" font-family="monospace, sans-serif" font-size="12" font-weight="bold" fill="#ffffff" text-anchor="middle">PR</text>
  </g>

  <g transform="translate(66, 86)">
    <circle cx="14" cy="14" r="24" fill="url(#redGlow)"/>
    <rect x="0" y="4" width="28" height="20" rx="4" fill="url(#prBadge)" stroke="#ffb4b4" stroke-width="1"/>
    <text x="14" y="18" font-family="monospace, sans-serif" font-size="12" font-weight="bold" fill="#ffffff" text-anchor="middle">PR</text>
  </g>

  <g transform="translate(166, 146)">
    <circle cx="14" cy="14" r="24" fill="url(#redGlow)"/>
    <rect x="0" y="4" width="28" height="20" rx="4" fill="url(#prBadge)" stroke="#ffb4b4" stroke-width="1"/>
    <text x="14" y="18" font-family="monospace, sans-serif" font-size="12" font-weight="bold" fill="#ffffff" text-anchor="middle">PR</text>
  </g>
</svg>
